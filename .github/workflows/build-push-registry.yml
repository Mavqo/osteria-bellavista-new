name: Build and Push to Local Registry

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: osteria-bellavista-new-registry-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: 192.168.1.158:5000
  IMAGE_NAME: osteria-bellavista-new
  IMAGE_LATEST: 192.168.1.158:5000/osteria-bellavista-new:latest
  IMAGE_SHA: 192.168.1.158:5000/osteria-bellavista-new:${{ github.sha }}

jobs:
  build-push-redeploy:
    name: Build, Push, and Redeploy
    runs-on:
      - self-hosted
      - Linux
      - osteria-bellavista-new
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to registry (optional)
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${REGISTRY_USERNAME}" ] && [ -n "${REGISTRY_PASSWORD}" ]; then
            echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY}" -u "${REGISTRY_USERNAME}" --password-stdin
          else
            echo "Registry credentials not set; continuing without auth."
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_LATEST }}
            ${{ env.IMAGE_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed image
        run: docker buildx imagetools inspect "${IMAGE_LATEST}"

      - name: Trigger Coolify redeploy webhook (with retry)
        env:
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${COOLIFY_DEPLOY_WEBHOOK}" ] || [ -z "${COOLIFY_API_TOKEN}" ]; then
            echo "COOLIFY_DEPLOY_WEBHOOK or COOLIFY_API_TOKEN not set. Skipping webhook trigger."
            exit 0
          fi
          for attempt in 1 2 3; do
            response="$(curl -sS -X POST "${COOLIFY_DEPLOY_WEBHOOK}" \
              -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
              -H 'Accept: application/json')"
            deployment_uuid="$(echo "${response}" | jq -r '.deployments[0].deployment_uuid // empty' 2>/dev/null || true)"
            if [ -n "${deployment_uuid}" ]; then
              echo "Coolify redeploy queued (deployment ${deployment_uuid}) on attempt ${attempt}."
              exit 0
            fi
            echo "Webhook attempt ${attempt} failed. Response: ${response}"
            sleep $((attempt * 5))
          done
          echo "Coolify redeploy webhook failed after 3 attempts."
          exit 1
